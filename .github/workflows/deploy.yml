name: Deploy to DigitalOcean
on:
  push:
    branches: [ "*" ]

jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v1
          with:
            node-version: 24
        - name: Install dependencies
          run: npm ci

        - name: Run tests
          run: npm run test